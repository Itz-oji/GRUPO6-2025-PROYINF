{% block content %}
<!DOCTYPE html>
<html>
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300&display=swap" rel="stylesheet">
        <title>Men&uacute;</title>
        <meta charset="utf-8">
        <style>
            .p1 {
                font-family: 'Roboto', sans-serif;
            }

            #clima {
                position: absolute;
                top: 115px; 
                right: 25px; 
                padding:10px 60px 10px 60px;
                background-color: #a8ced6;
                border-radius: 10px;
                box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);

            }

            #clima h3 {
                font-size: 1.2em;
                color: #666;
                text-align: right;
                margin: 0;
            }

            #clima .main-info {
                display: flex;
                align-items: center;

            }

            #clima .main-info img {

                height: 60px;
            }

            #clima .main-info .temp {

                font-weight: bold;

            }

            #clima .main-info .temp sup {
                font-size: 0.5em;
                margin-left: 5px;
                color: #666;
            }

            #clima .details {
                margin-top: 10px;
                font-size: 0.9em;
                color: #666;
            }

            #clima .details div {
                margin-top: 5px;
            }

            #weather {
                text-align: center;
            }
        </style>
    </head>
    <body>
